# canonical/mapping-matrix.yaml
# Complete field mapping — all CU analyzer fields to canonical schema.
# Precedence: higher = higher priority on conflict (max 6)

mappings:

  # DEAL INTAKE ANALYZER (core-deal-intake-analyzer-02)

  - canonicalPath: parties.client.name
    sourceAnalyzer: deal_intake
    sourceField: customerLegalName
    transform: as_is
    precedence: 5

  - canonicalPath: parties.vendor.name
    sourceAnalyzer: deal_intake
    sourceField: vendorLegalName
    transform: as_is
    precedence: 5

  - canonicalPath: parties.ndaType
    sourceAnalyzer: deal_intake
    sourceField: ndaType
    transform: as_is
    precedence: 4

  - canonicalPath: dates.effectiveDate
    sourceAnalyzer: deal_intake
    sourceField: ndaTargetExecutionDate
    transform: as_is
    precedence: 4

  - canonicalPath: scope.description
    sourceAnalyzer: deal_intake
    sourceField: sowObjective
    transform: as_is
    precedence: 5

  - canonicalPath: scope.deliverables
    sourceAnalyzer: deal_intake
    sourceField: inScope
    transform: as_is
    precedence: 3

  - canonicalPath: scope.outOfScope
    sourceAnalyzer: deal_intake
    sourceField: outOfScope
    transform: as_is
    precedence: 4

  - canonicalPath: confidentiality.term
    sourceAnalyzer: deal_intake
