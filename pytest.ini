[pytest]
# Contract Intelligence Platform — pytest configuration

# Default test paths
testpaths = tests

# Show test durations — useful for spotting slow integration tests
addopts = --tb=short --durations=10

# Markers (prevents PytestUnknownMarkWarning)
markers =
    unit: Fast unit tests — no Azure, no files needed (run these in every commit)
    golden: Snapshot tests against saved golden outputs
    pdf: PDF generation tests — requires reportlab but no Azure
    integration: Full pipeline tests — requires Azure credentials and network access

# Log output during tests
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s